<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Активация заказа с Ozon | Твой Магазин</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 40px 20px;
    }
    h1 { font-size: 2.2rem; margin-bottom: 1rem; color: #fff; }
    p { font-size: 1.1rem; line-height: 1.5; margin-bottom: 2rem; color: #aaa; }
    input {
      width: 100%;
      max-width: 360px;
      padding: 14px;
      font-size: 1.1rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: #111;
      color: white;
      margin-bottom: 1rem;
    }
    input:focus { border-color: #0066ff; outline: none; }
    button {
      padding: 14px 40px;
      font-size: 1.1rem;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 1rem;
    }
    button:hover { background: #0052cc; }
    button:disabled { background: #444; cursor: not-allowed; }
    #message {
      margin: 1.5rem 0;
      font-size: 1.1rem;
      padding: 12px;
      border-radius: 6px;
    }
    .success { background: #1a3d1a; color: #90ee90; }
    .error   { background: #3d1a1a; color: #ff9999; }

    .contacts {
      margin-top: 2rem;
      display: none; /* скрыто по умолчанию */
      flex-direction: column;
      gap: 1rem;
    }
    .contact-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 24px;
      font-size: 1.1rem;
      font-weight: 500;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      transition: all 0.2s;
    }
    .vk { background: #4c75a3; }
    .vk:hover { background: #3b5e8a; }
    .tg { background: #229ed9; }
    .tg:hover { background: #1a7db0; }
    .icon {
      font-size: 1.4rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Активация заказа с Ozon</h1>
    <p>Введите код активации, полученный после покупки на Ozon</p>

    <form id="form">
      <input type="text" id="code" placeholder="XXXX-XXXX-XXXX-XXXX" required autocomplete="off" />
      <button type="submit" id="btn">Активировать</button>
    </form>

    <div id="message"></div>

    <!-- Блок с контактами, который покажется после попытки -->
    <div class="contacts" id="contacts">
      <p style="color: #bbb; margin-bottom: 1.2rem;">Если возникли проблемы — напишите нам:</p>
      
      <a href="https://vk.com/aoki_gg" class="contact-btn vk" target="_blank">
        <span class="icon">VK</span> Написать в VK
      </a>
      
      <a href="https://t.me/aoki_support" class="contact-btn tg" target="_blank">
        <span class="icon">Telegram</span> Написать в Telegram
      </a>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const msg = document.getElementById('message');
    const input = document.getElementById('code');
    const contacts = document.getElementById('contacts');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = input.value.trim();

      if (!code) return;

      btn.disabled = true;
      msg.textContent = 'Проверка кода...';
      msg.className = '';

      try {
        const res = await fetch('/api/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });

        const data = await res.json();

        if (data.success) {
          msg.textContent = data.message || 'Код успешно активирован!';
          msg.className = 'success';
          input.value = '';
        } else {
          msg.textContent = data.message || 'Код недействителен или уже использован.';
          msg.className = 'error';
        }
      } catch (err) {
        msg.textContent = 'Ошибка соединения. Попробуйте позже.';
        msg.className = 'error';
      } finally {
        btn.disabled = false;
        // Показываем контакты В ЛЮБОМ СЛУЧАЕ после попытки
        contacts.style.display = 'flex';
      }
    });
  </script>

</body>
</html>
